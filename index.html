<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch Pre-Order Form</title>
</head>
<body>
    <h2>Order Form</h2>

    <!-- Order form where user inputs details -->
    <form onsubmit="return printReceipt();">
        
        <!-- Input for student's full name -->
        <label for="fullName">Full Name:</label>
        <input type="text" id="fullName" name="fullName" required><br><br>

        <!-- Input for student's grade and section -->
        <label for="gradeSection">Grade & Section:</label>
        <input type="text" id="gradeSection" name="gradeSection" required><br><br>

        <!-- Dropdown menu for food selection -->
        <label for="food">Food:</label>
        <select id="food" name="food">
            <option value="chicken">Chicken meal</option>
            <option value="pork">Pork meal</option>
            <option value="beef">Beef meal</option>
        </select><br><br>

        <!-- Input for quantity with minimum and maximum values -->
        <label for="quantity">Quantity (1-5):</label>
        <input type="number" id="quantity" name="quantity" min="1" max="5" required><br><br>

        <!-- Dropdown menu for customer type -->
        <label for="customerType">Customer Type:</label>
        <select id="customerType" name="customerType">
            <option value="student">Student</option>
            <option value="employee">Faculty/Staff</option>
        </select><br><br>

        <!-- Submit button -->
        <input type="submit" value="Place Order">
    </form>

    <hr>

    <!-- This is where the order summary will appear -->
    <div id="receipt"></div>

    <script>
        // Function to calculate subtotal based on food choice and quantity
        function calculateSubtotal(order, quantity) {
            switch (order) {
                case "chicken":
                    return 75 * quantity;
                case "pork":
                    return 85 * quantity;
                case "beef":
                    return 105 * quantity;
                default:
                    return "Item not found";
            }
        }

        // Function to calculate discount based on customer type
        // Students get 20% discount, Faculty/Staff get no discount
        function calculateDiscount(total, custType) {
            if (custType === "student") {
                return total * 0.20;
            } else {
                return 0;
            }
        }

        // Main function that runs when the form is submitted
        function printReceipt() {
            // Collect input values from the form
            let name = document.getElementById("fullName").value;
            let grade = document.getElementById("gradeSection").value;
            let food = document.getElementById("food").value;
            let quantity = parseInt(document.getElementById("quantity").value);
            let customerType = document.getElementById("customerType").value;

            // Calculate subtotal, discount, and final total
            let subtotal = calculateSubtotal(food, quantity);
            let discount = calculateDiscount(subtotal, customerType);
            let total = subtotal - discount;

            // Convert food value into readable meal name with price
            let foodName = "";
            switch (food) {
                case "chicken":
                    foodName = "Chicken meal (PHP 75)";
                    break;
                case "pork":
                    foodName = "Pork meal (PHP 85)";
                    break;
                case "beef":
                    foodName = "Beef meal (PHP 105)";
                    break;
                default:
                    foodName = "Item not found";
            }

            // Display order summary on the webpage using innerHTML
            document.getElementById("receipt").innerHTML =
                "<h2>ORDER SUMMARY</h2>" +
                "<p>Name: " + name + "</p>" +
                "<p>Grade & Section: " + grade + "</p>" +
                "<p>Order: " + foodName + "</p>" +
                "<p>Quantity: " + quantity + "</p>" +
                "<p>Subtotal: PHP " + subtotal + "</p>" +
                "<p>Discount: PHP " + discount + "</p>" +
                "<p>Total: PHP " + total + "</p>" +
                "<p>Thank you for your patronage!</p>";

            // Prevent page reload after form submission
            return false;
        }
    </script>
</body>
</html>
